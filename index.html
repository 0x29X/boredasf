  <style>

    @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
      cursor: default;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: #0a0a0a;
      background-image: 
        linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.85)),
        url("https://i.pinimg.com/originals/d3/75/42/d375422c9b36938a21321fd4e34c6e0e.gif");
      background-size: cover;
      background-position: center center;
      background-attachment: fixed;
      background-repeat: no-repeat;
      color: #ffffff;
      min-height: 100vh;
      width: 100%;
      overflow-x: hidden;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 30px 15px 80px 15px;
    }

    .center-container {
      width: 100%;
      max-width: 1300px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      z-index: 10;
      padding: 0 15px;
      gap: 15px;
      opacity: 0;
      animation: fadeInUp 1s ease 0.3s forwards;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .main-logo-container {
      text-align: center;
      margin: 10px 0 15px 0;
      padding-top: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .main-clan-logo {
      background: transparent;
      border: none;
      display: block;
      text-align: center;
      overflow: visible;
      position: relative;
      animation: floatLogo 4s ease-in-out infinite;
    }

    @keyframes floatLogo {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-12px); }
      100% { transform: translateY(0px); }
    }

    .main-clan-logo::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 120%;
      height: 120%;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.05) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }

    .main-clan-logo img {
      height: 220px;
      max-height: 220px;
      width: auto;
      display: block;
      margin: 0 auto;
      object-fit: contain;
      filter: drop-shadow(0 0 30px rgba(255, 255, 255, 0.15)) drop-shadow(0 0 60px rgba(120, 80, 255, 0.1));
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), filter 0.4s ease;
      position: relative;
      z-index: 1;
    }

    .main-clan-logo img:hover {
      transform: scale(1.08);
      filter: drop-shadow(0 0 40px rgba(255, 255, 255, 0.25)) drop-shadow(0 0 80px rgba(120, 80, 255, 0.2));
      cursor: default;
    }

    .symbol-break {
      font-family: 'Oswald', sans-serif;
      font-size: 44px;
      font-weight: 700;
      margin: 0;
      padding-top: 10px;
      text-align: center;
      display: block;
      letter-spacing: 6px;
      animation: metallicRGB 2s infinite alternate;
    }

    @keyframes metallicRGB {
      0% { color: #666; text-shadow: 0 0 4px #444, 0 0 8px #555; }
      25% { color: #888; text-shadow: 0 0 6px #666, 0 0 12px #777; }
      50% { color: #ccc; text-shadow: 0 0 8px #999, 0 0 16px #aaa; }
      75% { color: #eee; text-shadow: 0 0 6px #bbb, 0 0 12px #ccc; }
      100% { color: #fff; text-shadow: 0 0 4px #ddd, 0 0 8px #eee; }
    }

    .typewriter-header {
      font-family: 'Oswald', sans-serif;
      font-size: 30px;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      overflow: visible;
      white-space: nowrap;
      width: fit-content;
      margin: 0 auto 8px auto;
      position: relative;
      border: none;
      animation: metallicRGB 2s infinite alternate;
      padding: 0 20px;
    }

    .typewriter-header::before,
    .typewriter-header::after {
      content: '✦';
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      color: rgba(255, 255, 255, 0.2);
      animation: metallicRGB 2s infinite alternate;
    }
    .typewriter-header::before { left: -15px; }
    .typewriter-header::after { right: -15px; }

    .title-group-block {
      position: relative;
      margin: 10px 0;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .title-group-block::after {
      content: '';
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      margin-top: 5px;
    }

    .staff-header {
      font-family: 'Oswald', sans-serif;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 3px;
      position: relative;
      border: none;
      animation: metallicRGB 2s infinite alternate;
      padding: 0 15px;
    }

    .horizontal-avatar-row {
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      width: 100%;
      gap: 40px;
      padding: 15px 0 10px 0;
      min-height: 110px;
      position: relative;
    }

    .avatar-wrapper-node {
      position: relative;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: visible;
    }
    .avatar-wrapper-node:hover {
      transform: scale(1.1);
    }

    .circle-avatar-container {
      position: relative;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      overflow: visible;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    img.avatar-decoration {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(1.08);
      width: 120px;
      height: 120px;
      pointer-events: none;
      z-index: 1;
      border-radius: 0;
      object-fit: contain;
      background: transparent;
      display: block;
      opacity: 1;
      image-rendering: crisp-edges;
      filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.15));
    }

    .circle-avatar-container img.avatar-img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      pointer-events: none;
      position: relative;
      z-index: 2;
      border: 2px solid rgba(255, 255, 255, 0.08);
      background: #111;
      transition: border-color 0.3s ease;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
    }

    .avatar-wrapper-node:hover .circle-avatar-container img.avatar-img {
      border-color: rgba(255, 255, 255, 0.2);
    }

    .status-indicator {
      position: absolute;
      bottom: 5px;
      right: 5px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 2px solid #0a0a0a;
      z-index: 3;
      box-shadow: 0 0 8px rgba(0, 0, 0, 0.8);
      transition: transform 0.3s ease;
    }

    .avatar-wrapper-node:hover .status-indicator {
      transform: scale(1.15);
    }

    .status-online { background-color: #23a55a; box-shadow: 0 0 12px rgba(35, 165, 90, 0.4); }
    .status-idle { background-color: #f0b232; box-shadow: 0 0 12px rgba(240, 178, 50, 0.4); }
    .status-dnd { background-color: #f13f43; box-shadow: 0 0 12px rgba(241, 63, 67, 0.4); }
    .status-offline { background-color: #4a4a4e; }

    .avatar-tooltip {
      position: absolute;
      bottom: 130%;
      left: 50%;
      transform: translateX(-50%) scale(0.9);
      background: rgba(10, 10, 10, 0.95);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      width: 290px;
      padding: 18px 20px;
      color: #ffffff;
      opacity: 0;
      visibility: hidden;
      transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: none;
      z-index: 9999;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 255, 255, 0.05);
    }
    .avatar-wrapper-node:hover .avatar-tooltip {
      opacity: 1;
      visibility: visible;
      transform: translateX(-50%) translateY(-8px) scale(1);
      pointer-events: auto;
    }

    .tooltip-avatar-wrapper {
      position: relative;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      overflow: visible;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .avatar-link {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: inherit;
      text-decoration: none;
    }
    .tooltip-avatar-decoration {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(1.08);
      width: 52px;
      height: 52px;
      pointer-events: none;
      z-index: 1;
      object-fit: contain;
    }
    .tooltip-avatar-sm {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      z-index: 2;
      position: relative;
      border: 2px solid rgba(255, 255, 255, 0.05);
    }

    .tooltip-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }
    .tooltip-user-info h4 {
      font-size: 15px;
      font-weight: 600;
      margin: 0;
      color: #fff;
      letter-spacing: 0.5px;
    }
    .tooltip-user-info p {
      font-size: 11px;
      color: #888;
      margin: 2px 0 0 0;
      letter-spacing: 0.3px;
    }

    .tooltip-activity-wrapper {
      background: rgba(255, 255, 255, 0.04);
      border-radius: 6px;
      padding: 6px 10px;
      margin-top: 8px;
      font-size: 11px;
      color: #aaa;
      word-wrap: break-word;
      max-width: 100%;
      border-left: 2px solid rgba(255, 255, 255, 0.05);
    }
    .activity-playing { color: #43b581; border-left-color: #43b581; }
    .activity-streaming { color: #9146ff; border-left-color: #9146ff; }
    .activity-listening { color: #1db954; border-left-color: #1db954; }
    .activity-watching { color: #faa61a; border-left-color: #faa61a; }

    ::-webkit-scrollbar { display: none; }

    .name-label {
      text-align: center;
      font-family: 'Kanit', 'Inter', sans-serif;
      font-size: 14px;
      margin-top: 8px;
      color: #e6e6e6;
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: normal;
      line-height: 1.15;
      font-weight: 700;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
      letter-spacing: 0.3px;
    }
    .section-divider {
      width: 100%;
      max-width: 1100px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.06), transparent);
      margin: 8px 0;
    }

    .circle-avatar-container::before {
      content: '';
      position: absolute;
      top: -4px;
      left: -4px;
      right: -4px;
      bottom: -4px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.03), transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .avatar-wrapper-node.special-click {
      cursor: pointer;
    }
    .avatar-wrapper-node.special-click .avatar-link {
      cursor: pointer;
    }
    .avatar-wrapper-node.special-click .circle-avatar-container img.avatar-img {
      border-color: rgba(255, 215, 0, 0.3);
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }
    .avatar-wrapper-node.special-click:hover .circle-avatar-container img.avatar-img {
      border-color: rgba(255, 215, 0, 0.7);
      box-shadow: 0 0 30px rgba(255, 215, 0, 0.15);
    }

    @media (max-width: 768px) {
      body { padding: 15px 10px 70px 10px; }
      .main-clan-logo img { height: 120px; }
      .circle-avatar-container {
        width: 78px;
        height: 78px;
      }
      img.avatar-decoration {
        width: 95px;
        height: 95px;
        transform: translate(-50%, -50%) scale(1.05);
      }
      .circle-avatar-container img.avatar-img {
        width: 78px;
        height: 78px;
      }
      .horizontal-avatar-row {
        gap: 25px;
      }
      .typewriter-header {
        font-size: 22px;
        letter-spacing: 2px;
      }
      .typewriter-header::before,
      .typewriter-header::after {
        display: none;
      }
      .staff-header {
        font-size: 20px;
      }
      .avatar-tooltip {
        width: 240px;
        padding: 14px 16px;
      }
      .name-label {
        font-size: 12px;
      }
    }

    @media (max-width: 480px) {
      .circle-avatar-container {
        width: 65px;
        height: 65px;
      }
      .circle-avatar-container img.avatar-img {
        width: 65px;
        height: 65px;
      }
      img.avatar-decoration {
        width: 80px;
        height: 80px;
      }
      .horizontal-avatar-row {
        gap: 18px;
      }
      .typewriter-header {
        font-size: 18px;
      }
      .staff-header {
        font-size: 17px;
      }
    }
  </style>
</head>

  <audio id="soundtrack" loop preload="auto" style="display:none;">
    <source src="https://file.garden/aiHY1T3Ry0Odnk8G/Hev%20Abi%20-%20MEDICAL.mp3" type="audio/mpeg">
  </audio>

  <script>
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('keydown', function(e) {
      if (e.keyCode === 123 ||
        (e.ctrlKey && e.keyCode === 85) ||
        (e.ctrlKey && e.shiftKey && e.keyCode === 73) ||
        (e.ctrlKey && e.keyCode === 83)) {
        e.preventDefault();
        return false;
      }
      return true;
    });

    const audio = document.getElementById('soundtrack');
    if (audio) {
      audio.volume = 0.4;
      audio.play().catch(() => {
        const playOnInteraction = () => {
          audio.play().catch(() => {});
          document.removeEventListener('click', playOnInteraction);
          document.removeEventListener('touchstart', playOnInteraction);
          document.removeEventListener('keydown', playOnInteraction);
        };
        document.addEventListener('click', playOnInteraction);
        document.addEventListener('touchstart', playOnInteraction);
        document.addEventListener('keydown', playOnInteraction);
      });
    }

    const UPDATE_INTERVAL = 10000;

    const Godmother = ["1326903543046606901"];
    
    const Godfather = ["1236216336191852551","900457538569502761","911017863354155098","1135177103705391214","896774691165974568","799185668881645578","1288029746822910024"];
    
    const Tatlongkumag = ["1512837414924583020", "1514639241647362059", "1147538530281734167"];
    
    const Nakshits = ["708717096779120651", "750140736355303436", "494789328724033536", "857942370627354665", "1015473740391399474", "1377941322727424120", "1035424904092332033", "1256325364557545522", "696599738534985738","1191933300542021643"];

    const XEN = "1512837414924583020";
    const XEN_URL = "https://offcialx.xyz/angelica/";
    const MESHA = "1514639241647362059";
    const MESHA_URL = "https://offcialx.xyz/ashley/";
    const ZEON = "1147538530281734167";
    const ZEON_URL = "https://offcialx.xyz/zeon/";

    async function getUserData(userId) {
      try {
        const res = await fetch(`https://api.lanyard.rest/v1/users/${userId}`, { cache: 'no-cache' });
        if (!res.ok) return null;
        const json = await res.json();

        if (json.success && json.data) {
          const d = json.data;
          const user = d.discord_user || {};

          return {
            id: userId,
            username: user.username || "unknown",
            displayName: user.global_name || user.username || "Unknown",
            status: d.discord_status || 'offline',
            avatarURL: user.avatar ? `https://cdn.discordapp.com/avatars/${userId}/${user.avatar}.png?size=1024` : "https://cdn.discordapp.com/embed/avatars/0.png",
            effectURL: user.avatar_decoration_data?.asset ? `https://cdn.discordapp.com/avatar-decoration-presets/${user.avatar_decoration_data.asset}.png?size=256` : null,
            spotify: d.spotify || null,
            activities: d.activities || [],
            customStatus: (d.activities || []).find(a => a.type === 4) || null
          };
        }
        return null;
      } catch (e) {
        console.log("Error fetching user:", e);
        return null;
      }
    }

    async function fetchAndUpdate() {
      try {
        const [godmother, godfather, staff, members] = await Promise.allSettled([
          Promise.all(Godmother.map(getUserData)),
          Promise.all(Godfather.map(getUserData)),
          Promise.all(Tatlongkumag.map(getUserData)),
          Promise.all(Nakshits.map(getUserData)),
        ]);

        showGroup(godmother.status === 'fulfilled' ? godmother.value.filter(Boolean) : [], 'godmother-container');
        showGroup(godfather.status === 'fulfilled' ? godfather.value.filter(Boolean) : [], 'godfather-container');
        showGroup(staff.status === 'fulfilled' ? staff.value.filter(Boolean) : [], 'staff-container');
        showGroup(members.status === 'fulfilled' ? members.value.filter(Boolean) : [], 'members-container');
      } catch (e) {
        console.log("Update error:", e);
      }
    }

    function showGroup(members, containerId) {
      const box = document.getElementById(containerId);
      if (!box) return;
      box.innerHTML = '';

      members.forEach(mem => {
        const wrapper = document.createElement('div');
        wrapper.className = 'avatar-wrapper-node';

        const isSpecial = (mem.id === XEN || mem.id === MESHA || mem.id === ZEON);
        if (isSpecial) {
          wrapper.classList.add('special-click');
        }

        const decoHTML = mem.effectURL ? `<img src="${mem.effectURL}" class="avatar-decoration" alt="decoration" loading="lazy" onerror="this.remove()">` : '';

        let statusClass = 'status-offline';
        const s = String(mem.status || 'offline').toLowerCase().trim();
        if (s === 'online') statusClass = 'status-online';
        else if (s === 'idle') statusClass = 'status-idle';
        else if (s === 'dnd') statusClass = 'status-dnd';

        let statusText = '';
        let statusType = '';

        if (mem.spotify) {
          statusType = 'activity-listening';
          statusText = `[Listening] ${mem.spotify.song || 'Music'}`;
        } else if (Array.isArray(mem.activities) && mem.activities.length > 0) {
          const act = mem.activities.find(a => a.type !== 4) || mem.activities[0];
          if (act) {
            if (act.type === 0) { statusType = 'activity-playing'; statusText = `[Playing] ${act.name || 'Game'}`; } 
            else if (act.type === 1) { statusType = 'activity-streaming'; statusText = `[Streaming] ${act.name || 'Stream'}`; } 
            else if (act.type === 2) { statusType = 'activity-listening'; statusText = `[Listening] ${act.name || 'Music'}`; } 
            else if (act.type === 3) { statusType = 'activity-watching'; statusText = `[Watching] ${act.name || 'Video'}`; }
          }
        }
        if (mem.customStatus?.state) {
          statusText = mem.customStatus.state;
          statusType = '';
        }

        const tooltipDeco = mem.effectURL ? `<img src="${mem.effectURL}" class="tooltip-avatar-decoration" alt="decoration">` : '';

        wrapper.innerHTML = `
          <div class="avatar-link">
            <div class="circle-avatar-container">
              ${decoHTML}
              <img src="${mem.avatarURL}" class="avatar-img" alt="avatar" loading="lazy">
              <span class="status-indicator ${statusClass}"></span>
            </div>
            <div class="name-label">${mem.displayName}</div>
          </div>
          <div class="avatar-tooltip">
            <div class="tooltip-header">
              <div class="tooltip-avatar-wrapper">
                ${tooltipDeco}
                <img src="${mem.avatarURL}" class="tooltip-avatar-sm" alt="avatar" loading="lazy">
              </div>
              <div class="tooltip-user-info">
                <h4>${mem.displayName}</h4>
                <p>@${mem.username}</p>
              </div>
            </div>
            ${statusText ? `<div class="tooltip-activity-wrapper ${statusType}">${statusText}</div>` : ''}
          </div>
        `;

        if (isSpecial) {
          let url = XEN_URL;
          if (mem.id === MESHA) {
            url = MESHA_URL;
          } else if (mem.id === ZEON) {
            url = ZEON_URL;
          }
          wrapper.addEventListener('click', function(e) {
            e.stopPropagation();
            window.open(url, '_blank');
          });
          const link = wrapper.querySelector('.avatar-link');
          if (link) {
            link.style.cursor = 'pointer';
          }
        }

        box.appendChild(wrapper);
      });
    }

    fetchAndUpdate();
    setInterval(fetchAndUpdate, UPDATE_INTERVAL);
  </script>

</body>
</html>
