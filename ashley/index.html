    .top-logo {

    .profile-section {
      position: relative;
      display: inline-flex; flex-direction: column; align-items: center;
      margin: 0 auto 4px;
    }
    .avatar-wrap {
      position: relative;
      width: 180px; height: 180px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
    }
    .profile-pic-main {
      width: 148px; height: 148px;
      border-radius: 50%; object-fit: cover;
      border: 3px solid #0a0a0a;
      position: relative; z-index: 2; display: block;
      box-shadow: 0 0 28px rgba(0,0,0,0.8);
      transition: transform 0.3s;

    .avatar-wrap:hover .profile-pic-main { transform: scale(1.04); }
    .deco-img {
      position: absolute;
      width: 180px; height: 180px;
      top: 0; left: 0;
      object-fit: contain;
      pointer-events: none;
      z-index: 3;
      display: none;
    }
    .status-dot {
      position: absolute;
      bottom: 10px; right: 10px;
      width: 14px; height: 14px; border-radius: 50%;
      border: 3px solid #0a0a0a; z-index: 5;

    .s-online  { background: #43b581; }
    .s-idle    { background: #faa61a; }
    .s-dnd     { background: #f04747; }
    .s-offline { background: #747f8d; }
    .popup-card {
      position: absolute;
      bottom: calc(100% + 12px);
      left: 50%;
      transform: translateX(-50%) translateY(8px) scale(0.95);
      width: 268px;
      background: #000000;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px; overflow: visible;
      box-shadow: 0 20px 60px rgba(0,0,0,0.9);
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
      z-index: 50;
    }
    .avatar-wrap:hover .popup-card {
      opacity: 1; pointer-events: auto;
      transform: translateX(-50%) translateY(0) scale(1);
    }
    .popup-inner { border-radius: 10px; overflow: hidden; }
    .popup-banner-wrap {
      width: 100%; height: 88px;
      background: #000000;
      overflow: hidden; position: relative; flex-shrink: 0;

    .popup-banner {
      width: 100%; height: 100%; object-fit: cover;

    .popup-body { padding: 0 12px 12px; }
    .popup-avatar-row {

    .popup-avatar-wrap {

    .popup-avatar {

    .popup-deco {

      margin-top: 6px;
    }

  <script>
    const trailColors = ['#ffffff','#000000','#ffffff','#000000','#ffffff'];
    document.addEventListener('mousemove', e => {
      const d = document.createElement('div');
      d.classList.add('trail-dot');
      const sz = 3 + Math.random() * 5;
      const color = trailColors[Math.floor(Math.random() * trailColors.length)];
      d.style.cssText = `width:${sz}px;height:${sz}px;background:${color};left:${e.clientX}px;top:${e.clientY}px;`;
      document.body.appendChild(d);
      setTimeout(() => d.style.opacity = '0', 20);
      setTimeout(() => d.remove(), 520);
    });
    const introPanel = document.getElementById('intro-panel');
    const content    = document.querySelector('.content');
    const audio      = document.getElementById('intro-audio');
    function typeWriter(el, text) {
      el.textContent = ''; el.classList.add('typing-caret'); let i = 0;
      const tick = () => {
        if (i < text.length) { el.textContent += text[i++]; setTimeout(tick, 80); }
        else el.classList.remove('typing-caret');
      };
      setTimeout(tick, 500);
    }
    function typeWriterLoop(el, text, speed = 80, pauseTime = 1500) {
      el.textContent = '';
      let i = 0;
      el.classList.add('typing-caret');
      const type = () => {
        if (i < text.length) {
          el.textContent += text[i++];
          setTimeout(type, speed);
        } else {
          setTimeout(erase, pauseTime);
        }
      };
      const erase = () => {
        i--;
        if (i >= 0) {
          el.textContent = text.substring(0, i);
          setTimeout(erase, speed * 0.5);
        } else {
          setTimeout(type, 500);
        }
      };
      type();
    }
    function playAudio() {
      audio.volume = 0;
      audio.play().catch(() => {});
      let iv = setInterval(() => {
        audio.volume < 0.6 ? audio.volume = Math.min(0.6, audio.volume + 0.02) : clearInterval(iv);
      }, 80);
    }
    introPanel.addEventListener('click', () => {
      playAudio();
      introPanel.style.opacity = '0';
      setTimeout(() => {
        introPanel.style.display = 'none';
        content.style.display = 'flex';
        typeWriter(document.getElementById('main-title'), '@ ashley');
        typeWriterLoop(document.querySelector('.sub-text'), 'nothing happen');
      }, 700);
    });
    document.addEventListener('click', () => {
      if (audio.paused && introPanel.style.display === 'none') {
        playAudio();
      }
    });
    const UID = '1514639241647362059';
    const SC  = { online:'s-online', idle:'s-idle', dnd:'s-dnd', offline:'s-offline' };
    function applyStatus(ids, cls) {
      ids.forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;
        el.className = el.className.replace(/s-\w+/g, '').trim() + ' ' + cls;
      });
    }
    async function loadProfile() {
      try {
        const res  = await fetch(`https://api.lanyard.rest/v1/users/${UID}`);
        const json = await res.json();
        if (!json.success) return;
        const data   = json.data;
        const user   = data.discord_user;
        const status = data.discord_status || 'offline';
        const sc     = SC[status] || 's-offline';
        const aExt   = user.avatar?.startsWith('a_') ? '.gif' : '.png';
        const avatar = user.avatar
          ? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}${aExt}?size=512`
          : `https://cdn.discordapp.com/embed/avatars/${parseInt(user.discriminator || '0') % 5}.png`;
        const bHash  = user.banner;
        const banner = bHash
          ? `https://cdn.discordapp.com/banners/${user.id}/${bHash}${bHash.startsWith('a_') ? '.gif' : '.png'}?size=600`
          : null;
        const decoAsset = user.avatar_decoration_data?.asset;
        const decoUrl   = decoAsset
          ? `https://cdn.discordapp.com/avatar-decoration-presets/${decoAsset}.png?size=160&passthrough=true`
          : null;
        let cStatus = '';
        (data.activities || []).forEach(act => {
          if (act.type === 4 && act.state) cStatus = act.state;
          if (act.type === 2) {
            const art = act.assets?.large_image
              ? `https://i.scdn.co/image/${act.assets.large_image.split(':')[1]}`
              : '';
            document.getElementById('sp-art').src            = art;
            document.getElementById('sp-title').textContent  = act.details || '�';
            document.getElementById('sp-artist').textContent = act.state   || '';
            document.getElementById('spotify-widget').style.display = 'flex';
          }
        });
        document.getElementById('profile-pic').src = avatar;
        const decoEl      = document.getElementById('deco-img');
        const popupDecoEl = document.getElementById('popup-deco');
        if (decoUrl) {
          decoEl.src      = decoUrl;        popupDecoEl.src = decoUrl;      
        } else {
          decoEl.style.display      = 'none';
          popupDecoEl.style.display = 'none';
        }
        applyStatus(['status-dot'], sc);
        applyStatus(['popup-sdot'], sc);
        document.getElementById('popup-slabel').textContent = status;
        const bannerEl = document.getElementById('popup-banner');
        if (banner) {
          bannerEl.src = banner;
        } else {
          bannerEl.style.display = 'none';
        }
        document.getElementById('popup-avatar').src = avatar;
        document.getElementById('popup-name').textContent   = user.global_name || user.username;
        document.getElementById('popup-handle').textContent = '@' + user.username;
        if (cStatus) {
          document.getElementById('blinking-notes').textContent = cStatus;
          document.getElementById('popup-cstatus').textContent  = cStatus;
        }
      } catch (e) { console.error('Lanyard error:', e); }
    }
    loadProfile();
    setInterval(loadProfile, 30000);
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('keydown', e => {
      if (
        e.key === 'F12' ||
        (e.ctrlKey && e.shiftKey && ['I','J','C'].includes(e.key)) ||
        (e.ctrlKey && e.key === 'U')
      ) e.preventDefault();
    });
  </script>

    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db   = firebase.firestore();
    const cDoc = db.collection('counters').doc('visitorCount');
    (async () => {
      try {
        const n = await db.runTransaction(async t => {
          const d = await t.get(cDoc);
          const c = d.exists ? (d.data().count || 0) + 1 : 1;
          t.set(cDoc, { count: c }, { merge: true });
          return c;
        });
        document.getElementById('view-count').innerText = n;
      } catch (e) {
        document.getElementById('view-count').innerText = 'Error';
      }
    })();
